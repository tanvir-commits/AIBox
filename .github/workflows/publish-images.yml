# Build and push backend + web images to GitHub Container Registry (public pulls when repo is public).
name: Publish images

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: aibox-backend
          - id: web
            context: ./web
            dockerfile: ./web/Dockerfile
            image: aibox-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Public repo ≠ public GHCR packages by default — anonymous docker pull needs this.
  make-public:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        package: [aibox-backend, aibox-web]
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pkg = '${{ matrix.package }}';
            try {
              await github.rest.packages.updatePackageVisibilityForAuthenticatedUser({
                package_type: 'container',
                package_name: pkg,
                visibility: 'public',
              });
              core.info(`Set ${pkg} to public`);
            } catch (e) {
              core.warning(`Could not set ${pkg} public: ${e.message}`);
              core.info('Manual fix: github.com/users/${{ github.repository_owner }}/packages → Package settings → Public');
            }
