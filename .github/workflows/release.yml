# Tag push (v*): Windows launcher + source ZIP on GitHub Releases.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Windows launcher
        working-directory: launcher
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../PrivateAIBox.exe .

      - name: Pack release ZIP (source + exe + handout)
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGING="privateai-box-${VERSION}"
          mkdir -p "$STAGING"
          git archive HEAD | tar -x -C "$STAGING"
          cp PrivateAIBox.exe "$STAGING/"
          cp SHARE_WITH_FRIENDS.txt "$STAGING/"
          (cd "$STAGING" && zip -r "../privateai-box-${VERSION}-windows.zip" .)
          ls -la "privateai-box-${VERSION}-windows.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PrivateAI Box ${{ github.ref_name }}
          body: |
            ## Download (Windows + Docker Desktop)

            1. Install [Docker Desktop](https://docs.docker.com/desktop/setup/install/windows-install/) and start it.
            2. Download **`privateai-box-${{ github.ref_name }}-windows.zip`** below and unzip.
            3. Double-click **`PrivateAIBox.exe`** → browser opens at http://localhost:3000
            4. Sign in: `admin@example.com` / `changeme`

            **Download page:** https://tanvir-commits.github.io/AIBox/

            If image pull fails, the launcher builds locally (slower). Make GHCR packages public:
            GitHub → Packages → `aibox-backend` / `aibox-web` → Package settings → **Public**.
          files: |
            PrivateAIBox.exe
            privateai-box-${{ github.ref_name }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
