# Default: pull prebuilt app images from GHCR (see .env.example).
# Local source build: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-privateai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-privateai}
      POSTGRES_DB: ${POSTGRES_DB:-privateai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privateai -d privateai"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  backend:
    image: ${PRIVATEAI_BACKEND_IMAGE:-ghcr.io/tanvir-commits/aibox-backend:latest}
    pull_policy: missing
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-privateai}:${POSTGRES_PASSWORD:-privateai}@postgres:5432/${POSTGRES_DB:-privateai}
      QDRANT_URL: http://qdrant:6333
      UPLOAD_ROOT: /data/uploads
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-changeme}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-mock_llm}
      DEFAULT_EMBEDDING_PROVIDER: ${DEFAULT_EMBEDDING_PROVIDER:-fastembed}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-384}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
    volumes:
      - backend_uploads:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  web:
    image: ${PRIVATEAI_WEB_IMAGE:-ghcr.io/tanvir-commits/aibox-web:latest}
    pull_policy: missing
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  qdrant_data:
  backend_uploads:
